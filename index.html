<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Oscilloscope - Scoppy Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
        
        body {
            background-color: #000000;
            color: #d1d5db;
            font-family: 'Chakra Petch', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100dvh;
            overscroll-behavior: none;
        }

        /* Digital readout font-vibe */
        .font-osd {
            font-family: 'Share Tech Mono', monospace;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }

        /* Draggable parameters cursor style */
        .btn-draggable {
            cursor: ew-resize !important;
        }

        #scopeCanvas {
            cursor: move;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
            font-family: 'Share Tech Mono', monospace;
        }

        input::selection {
            background: rgba(59, 130, 246, 0.4) !important;
            color: #fbbf24 !important;
        }
        input::-moz-selection {
            background: rgba(59, 130, 246, 0.4) !important;
            color: #fbbf24 !important;
        }
    </style>
</head>
<body class="w-screen flex flex-col landscape:flex-row">

    <!-- Value Input Modal -->
    <div id="valueModal" class="absolute inset-0 bg-black/60 items-center justify-center z-[100] hidden">
        <div class="bg-[#2a2a2a] rounded-sm shadow-2xl max-w-[320px] w-full mx-4 border border-gray-700">
            <div class="p-6">
                <h2 id="modalTitle" class="text-white text-lg font-medium mb-8">Value</h2>
                <input type="number" id="modalInput" step="any" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-[#fbbf24] text-[#fbbf24] outline-none pb-1 text-xl font-osd" value="0">
            </div>
            <div class="flex justify-end gap-6 p-5 pt-0">
                <button id="modalCancel" class="text-[#fbbf24] font-bold text-sm tracking-wide uppercase hover:text-amber-400 transition">Cancel</button>
                <button id="modalOk" class="text-[#fbbf24] font-bold text-sm tracking-wide uppercase hover:text-amber-400 transition">OK</button>
            </div>
        </div>
    </div>

    <!-- Main Oscilloscope Area -->
    <main class="flex-1 flex flex-col relative h-[60dvh] landscape:h-full min-w-0">
        
        <!-- Top Info Bar -->
        <div class="h-8 shrink-0 bg-[#111111] border-b border-gray-800 flex justify-between items-center px-4 font-osd text-xs text-gray-400">
            <div class="flex gap-6">
                <span id="top-samplerate">-- kS/s</span>
                <span class="hidden sm:inline">400 pts</span>
            </div>
            <div class="flex gap-4 items-center">
                <span id="top-timediv">500us/div</span>
                <span id="top-trigoffset" class="hidden sm:inline select-none cursor-pointer hover:text-[#fbbf24] transition-colors">0.0 divs</span>
                <button id="btn-fullscreen" class="text-gray-400 hover:text-white ml-1 p-1 rounded hover:bg-gray-800 transition-colors" title="Toggle Fullscreen">
                    <svg id="svg-fullscreen" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6 M21 21v-4.8 M21 21h-4.8 M3 16.2V21 M3 21h4.8 M3 21l6-6 M21 7.8V3 M21 3h-4.8 M21 3l-6 6 M3 7.8V3 M3 3h4.8 M3 3l6 6" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Canvas Container -->
        <div class="flex-1 relative bg-[#0a0a0a] min-h-0">
            <canvas id="scopeCanvas"></canvas>
            
            <div class="absolute top-2 right-4 text-right font-osd text-xs pointer-events-none">
                <div id="osd-runstate" class="text-gray-500 font-bold">STOPPED</div>
            </div>

            <div class="absolute bottom-4 left-4 font-osd text-xs leading-tight pointer-events-none">
                <div class="text-yellow-400 mb-1">CH1</div>
                <div class="text-gray-300">Vmin: <span id="osd-vmin">+0.00</span></div>
                <div class="text-gray-300">Vmax: <span id="osd-vmax">+0.00</span></div>
                <div class="text-gray-300">Vpp:  <span id="osd-vpp">+0.00</span></div>
                <div class="text-gray-300">Freq: <span id="osd-freq">-- Hz</span></div>
            </div>

            <div id="connectOverlay" class="absolute inset-0 bg-black/60 flex items-center justify-center z-50" style="display: none;">
                <div class="bg-[#1e1e1e] border border-gray-700 p-6 rounded shadow-2xl text-center max-w-sm mx-4">
                    <h2 class="text-white text-lg font-bold mb-2">Device Disconnected</h2>
                    <p class="text-gray-400 text-sm mb-6">Click below to pair with your ESP32 via Web Bluetooth.</p>
                    <button id="connectBtn" class="bg-gray-100 text-black hover:bg-gray-300 font-bold py-3 px-6 rounded transition w-full shadow-lg font-osd">
                        CONNECT DEVICE
                    </button>
                    <p id="connStatus" class="text-xs text-gray-500 mt-4"></p>
                </div>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="h-10 shrink-0 bg-[#111111] border-t border-gray-800 flex items-center px-2 gap-2 font-osd text-xs overflow-x-auto whitespace-nowrap">
            <div class="flex border border-gray-700 rounded-sm overflow-hidden text-[10px] font-bold shrink-0">
                <button id="btn-mode-demo" class="px-3 py-1 transition-all focus:outline-none">DEMO</button>
                <button id="btn-mode-ble" class="px-3 py-1 transition-all focus:outline-none">BLE</button>
            </div>
            <div class="bg-yellow-400 text-black px-2 py-1 font-bold flex items-center gap-2 rounded-sm">CH1 <span id="btm-voltsdiv" class="font-normal text-gray-800">1.00V/div</span></div>
            <div class="bg-[#333] text-gray-400 px-2 py-1 rounded-sm">CH2 <span class="text-gray-500 ml-2">OFF</span></div>
            <div class="bg-gray-200 text-black px-2 py-1 flex items-center gap-2 font-bold rounded-sm">TRIG <span id="btm-triglevel" class="font-normal text-gray-800">1.65V</span></div>
            <div class="ml-auto text-gray-500 pr-2" id="stat-fps">FPS: 0</div>
        </div>
    </main>

    <!-- Right Control Panel -->
    <aside class="w-full landscape:w-[260px] lg:landscape:w-[320px] bg-[#1e1e1e] border-t landscape:border-t-0 landscape:border-l border-gray-800 flex flex-col h-[40dvh] landscape:h-full overflow-y-auto">
        <div class="flex p-4 pb-2 shrink-0">
            <button id="btn-runstop" class="w-full bg-yellow-400 text-black border border-yellow-500 rounded-sm font-bold py-2 text-sm transition-all hover:bg-yellow-500">RUN</button>
        </div>

        <div class="p-4 pt-2 flex flex-col gap-6">
            <section>
                <h3 class="text-gray-400 text-xs mb-3">Horizontal</h3>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden h-8 mb-2">
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-time-minus">-</button>
                    <button class="flex-1 bg-[#222] transition text-xs font-bold text-gray-300 border-x border-gray-700 flex items-center justify-center" id="btn-time-val">TIME/DIV</button>
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-time-plus">+</button>
                </div>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden h-8">
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-hpos-minus">-</button>
                    <button class="flex-1 bg-[#222] transition text-xs font-bold text-gray-300 border-x border-gray-700 flex items-center justify-center" id="btn-hpos-val">POSITION</button>
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-hpos-plus">+</button>
                </div>
            </section>
            <hr class="border-gray-700">
            <section>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-gray-400 text-xs">Vertical</h3>
                </div>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden h-8 mb-2">
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-volt-minus">-</button>
                    <button class="flex-1 bg-[#222] transition text-xs font-bold text-gray-300 border-x border-gray-700 flex items-center justify-center" id="btn-volt-val">VOLTS/DIV</button>
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-volt-plus">+</button>
                </div>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden h-8">
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-vpos-minus">-</button>
                    <button class="flex-1 bg-[#222] transition text-xs font-bold text-gray-300 border-x border-gray-700 flex items-center justify-center" id="btn-vpos-val">POSITION</button>
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-vpos-plus">+</button>
                </div>
            </section>
            <hr class="border-gray-700">
            <section>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-gray-400 text-xs">Trigger</h3>
                </div>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden text-[10px] font-bold mb-3 h-8">
                    <button class="flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition" id="btn-trig-none">NONE</button>
                    <button class="flex-1 bg-yellow-400 text-black transition border-x border-gray-700" id="btn-trig-auto">AUTO</button>
                    <button class="flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition" id="btn-trig-norm">NORM</button>
                </div>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden h-8 mb-3">
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-trigl-minus">-</button>
                    <button class="flex-1 bg-[#222] transition text-xs font-bold text-gray-300 border-x border-gray-700 flex items-center justify-center" id="btn-trigl-val">LEVEL</button>
                    <button class="w-10 bg-[#1a1a1a] text-gray-400 hover:bg-[#333] hover:text-white transition text-lg flex items-center justify-center" id="btn-trigl-plus">+</button>
                </div>
                <div class="flex border border-gray-700 rounded-sm overflow-hidden text-[10px] font-bold h-8">
                    <button class="flex-1 bg-yellow-400 text-black transition border-r border-gray-700" id="btn-edge-rise">RISING EDGE</button>
                    <button class="flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition" id="btn-edge-fall">FALLING EDGE</button>
                </div>
            </section>
        </div>
    </aside>

    <script>
        // --- Web Bluetooth Variables ---
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const TX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        let rxCharacteristic = null, txCharacteristic = null, bleDevice = null;
        const BUFFER_SIZE = 400;

        // --- Scope State & UI Settings ---
        let isPaused = true;
        let isDemoMode = true; 
        let demoInterval = null;
        let demoPhaseDrift = 0;
        let hasReceivedData = false; 
        
        let timebaseUs = 50; 
        let voltsPerDiv = 1.0; 
        let verticalOffset = 0; 
        let horizontalOffsetDivs = 0; 
        let triggerLevelV = 1.65; 
        let currentEdge = 1; 
        let triggerMode = 1; 

        const timeSettings = [10, 25, 50, 100, 250, 500, 1000, 2500, 5000];
        const voltSettings = [0.1, 0.2, 0.5, 1.0, 2.0, 5.0];

        let lastData = new Uint8Array(BUFFER_SIZE); 

        // Grid Constants
        const hDivs = 12;
        const vDivs = 8; 

        // FPS tracking
        let frameCount = 0;
        let lastFpsTime = performance.now();

        const isMobileDevice = window.matchMedia("(any-pointer: coarse)").matches || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // --- DOM Elements ---
        const canvas = document.getElementById('scopeCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('connectOverlay');
        const connStatus = document.getElementById('connStatus');

        const txtTimeDiv = document.getElementById('top-timediv');
        const txtVoltsDiv = document.getElementById('btm-voltsdiv');
        const txtTrigLevel = document.getElementById('btm-triglevel');
        const txtRunState = document.getElementById('osd-runstate');
        const txtSampleRate = document.getElementById('top-samplerate');
        const btnRunStop = document.getElementById('btn-runstop');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const svgFullscreen = document.getElementById('svg-fullscreen');
        const txtTrigOffset = document.getElementById('top-trigoffset');

        const btnModeDemo = document.getElementById('btn-mode-demo');
        const btnModeBle = document.getElementById('btn-mode-ble');

        const btnTrigNone = document.getElementById('btn-trig-none');
        const btnTrigAuto = document.getElementById('btn-trig-auto');
        const btnTrigNorm = document.getElementById('btn-trig-norm');

        const btnEdgeRise = document.getElementById('btn-edge-rise');
        const btnEdgeFall = document.getElementById('btn-edge-fall');

        const pathExpand = "M21 21l-6-6 M21 21v-4.8 M21 21h-4.8 M3 16.2V21 M3 21h4.8 M3 21l6-6 M21 7.8V3 M21 3h-4.8 M21 3l-6 6 M3 7.8V3 M3 3h4.8 M3 3l6 6";
        const pathShrink = "M15 15l6 6 M15 15v4.8 M15 15h4.8 M9 15v4.8 M9 15H4.2 M9 15l-6 6 M15 9V4.2 M15 9h4.8 M15 9l6-6 M9 9V4.2 M9 9H4.2 M9 9L3 3";

        document.addEventListener('fullscreenchange', () => {
            const path = svgFullscreen.querySelector('path');
            if (document.fullscreenElement) {
                path.setAttribute('d', pathShrink);
                btnFullscreen.title = "Exit Fullscreen";
            } else {
                path.setAttribute('d', pathExpand);
                btnFullscreen.title = "Toggle Fullscreen";
            }
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else {
                document.exitFullscreen();
            }
        });

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            drawGraticule();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function generateDemoWave() {
            if (!isDemoMode || isPaused) return;
            const data = new Uint8Array(BUFFER_SIZE);
            
            let delayUs = timebaseUs + 9;
            let totalCaptureTimeUs = BUFFER_SIZE * delayUs;
            let wavePeriodUs = 1000;
            
            let cycles = Math.round(totalCaptureTimeUs / wavePeriodUs);
            if (cycles < 1) cycles = 1;
            
            let phaseInc = (Math.PI * 2 * cycles) / BUFFER_SIZE;
            let trig8bit = Math.floor((triggerLevelV / 3.3) * 255);
            let trigOffset = (trig8bit - 127) / 80; 
            let isTriggerValid = (trigOffset >= -1 && trigOffset <= 1);
            
            let startPhase = 0;
            
            if (triggerMode === 0) {
                demoPhaseDrift += 0.15;
                startPhase = demoPhaseDrift;
            } else if (triggerMode === 2) {
                if (isTriggerValid) {
                    startPhase = Math.asin(trigOffset);
                    if (currentEdge === 0) startPhase = Math.PI - startPhase; 
                } else {
                    return; 
                }
            } else {
                if (isTriggerValid) {
                    startPhase = Math.asin(trigOffset);
                    if (currentEdge === 0) startPhase = Math.PI - startPhase; 
                } else {
                    demoPhaseDrift += 0.15;
                    startPhase = demoPhaseDrift;
                }
            }

            for(let i = 0; i < BUFFER_SIZE; i++) {
                let val = 127 + Math.sin(startPhase + i * phaseInc) * 80;
                val += (Math.random() * 3 - 1.5); 
                data[i] = val;
            }
            
            hasReceivedData = true;
            lastData.set(data);
            drawWaveform(data);
            calculateStats(data);
            
            frameCount++;
            let now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('stat-fps').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        function updateDemoUI() {
            if (isDemoMode) {
                btnModeDemo.className = "px-3 py-1 transition-all bg-yellow-400 text-black font-bold cursor-pointer";
                btnModeBle.className = "px-3 py-1 transition-all bg-[#1a1a1a] text-gray-500 hover:text-gray-300 cursor-pointer";
                overlay.style.display = 'none';
                updateRunStateUI();
                if (!demoInterval) demoInterval = setInterval(generateDemoWave, 33);
            } else {
                if (demoInterval) {
                    clearInterval(demoInterval);
                    demoInterval = null;
                }
                btnModeDemo.className = "px-3 py-1 transition-all bg-[#1a1a1a] text-gray-500 hover:text-gray-300 cursor-pointer";
                if (bleDevice && bleDevice.gatt.connected) {
                    btnModeBle.className = "px-3 py-1 transition-all bg-emerald-500 text-white font-bold cursor-pointer";
                    overlay.style.display = 'none';
                } else {
                    btnModeBle.className = "px-3 py-1 transition-all bg-yellow-400 text-black font-bold cursor-pointer";
                    overlay.style.display = 'flex';
                    lastData.fill(0);
                    drawWaveform(lastData);
                }
            }
        }

        btnModeDemo.addEventListener('click', () => { isDemoMode = true; updateDemoUI(); });
        btnModeBle.addEventListener('click', () => { isDemoMode = false; updateDemoUI(); });

        const connectBtn = document.getElementById('connectBtn');
        if (!navigator.bluetooth) {
            connectBtn.disabled = true;
            connectBtn.textContent = "BROWSER UNSUPPORTED";
            connectBtn.classList.replace('bg-gray-100', 'bg-red-900');
            connectBtn.classList.replace('text-black', 'text-white');
            connectBtn.classList.replace('hover:bg-gray-300', 'hover:bg-red-900');
            connectBtn.classList.add('cursor-not-allowed');
            connStatus.innerHTML = "<span class='text-red-400'>Web Bluetooth is blocked or unsupported (e.g. iOS). Use Chrome/Edge on Desktop or Android.</span>";
        }

        connectBtn.addEventListener('click', async () => {
            try {
                connStatus.textContent = "Requesting device (Check browser popup)...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                connStatus.textContent = "Connecting to device...";
                bleDevice.addEventListener('gattserverdisconnected', onDisconnect);
                const server = await bleDevice.gatt.connect();
                
                connStatus.textContent = "Getting Services...";
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                connStatus.textContent = "Getting Characteristics...";
                rxCharacteristic = await service.getCharacteristic(RX_UUID);
                txCharacteristic = await service.getCharacteristic(TX_UUID);

                connStatus.textContent = "Starting Data Stream...";
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                isDemoMode = false;
                isPaused = false;
                updateDemoUI();
                sendAllConfigToESP32();
                
            } catch (error) {
                console.error(error);
                connStatus.textContent = "Error: " + error.message;
            }
        });

        function onDisconnect() {
            connStatus.textContent = "Connection lost. Please reconnect.";
            isPaused = true;
            updateRunStateUI();
            updateDemoUI(); 
        }


        // NEW: Chunking Buffer Logic for Windows Bluetooth Compatibility
        let bleRxBuffer = new Uint8Array(BUFFER_SIZE);
        let bleRxIndex = 0;

        function handleNotifications(event) {
            if (isPaused || isDemoMode) return; 
            
            const incomingData = new Uint8Array(event.target.value.buffer);
            
            // If the browser/OS negotiated MTU properly, it arrives in one perfect 400-byte chunk
            if (incomingData.length === BUFFER_SIZE) {
                processCompleteFrame(incomingData);
                return;
            }
            
            // If the browser/OS fails MTU negotiation (Very common on Windows), 
            // it fragments the data into ~20-byte chunks. We catch them in a bucket here:
            for(let i = 0; i < incomingData.length; i++) {
                if(bleRxIndex < BUFFER_SIZE) {
                    bleRxBuffer[bleRxIndex++] = incomingData[i];
                }
                
                // Once the bucket fills up to 400, process the complete wave!
                if (bleRxIndex >= BUFFER_SIZE) {
                    processCompleteFrame(bleRxBuffer);
                    bleRxIndex = 0; // Empty the bucket for the next wave
                }
            }
        }

        function processCompleteFrame(data) {
            hasReceivedData = true;
            lastData.set(data);
            drawWaveform(data);
            calculateStats(data);
            
            frameCount++;
            let now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('stat-fps').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        async function sendCommand(cmd) {
            if (rxCharacteristic && !isDemoMode) {
                try {
                    let encoder = new TextEncoder();
                    await rxCharacteristic.writeValueWithoutResponse(encoder.encode(cmd))
                        .catch(() => rxCharacteristic.writeValue(encoder.encode(cmd))); 
                } catch(e) { console.error("Write error:", e); }
            }
        }

        function sendAllConfigToESP32() {
            if(isDemoMode) return;
            sendCommand("T" + Math.round(timebaseUs));
            let trig8bit = Math.floor((triggerLevelV / 3.3) * 255);
            setTimeout(() => sendCommand("L" + trig8bit), 50);
            setTimeout(() => sendCommand("E" + currentEdge), 100);
            setTimeout(() => sendCommand("M" + triggerMode), 150);
            setTimeout(() => sendCommand("P" + (isPaused ? "1" : "0")), 200);
        }

        const valueModal = document.getElementById('valueModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalInput = document.getElementById('modalInput');
        const modalCancel = document.getElementById('modalCancel');
        const modalOk = document.getElementById('modalOk');
        let modalSubmitCallback = null;

        function openValueModal(title, currentValue, callback) {
            modalTitle.textContent = title;
            modalInput.value = currentValue;
            modalSubmitCallback = callback;
            valueModal.style.display = 'flex';
            modalInput.focus();
            modalInput.select();
        }

        function closeValueModal() {
            valueModal.style.display = 'none';
            modalSubmitCallback = null;
        }

        modalCancel.addEventListener('click', closeValueModal);
        modalOk.addEventListener('click', () => {
            if (modalSubmitCallback) {
                const val = parseFloat(modalInput.value);
                if (!isNaN(val)) modalSubmitCallback(val);
            }
            closeValueModal();
        });
        
        modalInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') modalOk.click();
            if (e.key === 'Escape') modalCancel.click();
        });

        function formatValueForBtn(btnId, val) {
            if (btnId === 'btn-time-val') {
                if (val >= 1000) return (val / 1000).toFixed(1).replace('.0', '') + "ms";
                else return Math.round(val) + "us";
            }
            if (btnId === 'btn-hpos-val' || btnId === 'btn-vpos-val') return (val >= 0 ? '+' : '') + val.toFixed(1) + " div";
            if (btnId === 'btn-volt-val') return val.toFixed(2) + "V";
            if (btnId === 'btn-trigl-val') return val.toFixed(2) + "V";
            return val.toFixed(2);
        }

        function bindSmartInput(btnId, title, getVal, callback, dragConfig = { type: 'linear', step: 0.05 }) {
            const btn = document.getElementById(btnId);
            btn.classList.add('btn-draggable');
            const originalText = btn.textContent;
            let startX = 0, startVal = 0, hasDragged = false;

            const applyDragVisuals = (newVal) => {
                btn.textContent = formatValueForBtn(btnId, newVal);
                btn.classList.add('font-osd', 'text-[#fbbf24]', 'bg-[#333]');
                btn.classList.remove('bg-[#222]', 'text-gray-300');
            };

            const clearDragVisuals = () => {
                btn.textContent = originalText;
                btn.classList.remove('font-osd', 'text-[#fbbf24]', 'bg-[#333]');
                btn.classList.add('bg-[#222]', 'text-gray-300');
            };

            const onMouseDown = (e) => {
                if (e.button !== 0 || btn.querySelector('input')) return; 
                startX = e.clientX; startVal = getVal(); hasDragged = false;
                document.body.style.cursor = 'ew-resize'; document.body.style.userSelect = 'none';

                const onMouseMove = (moveEvent) => {
                    const deltaX = moveEvent.clientX - startX;
                    if (!hasDragged && Math.abs(deltaX) > 4) hasDragged = true;
                    if (hasDragged) {
                        let newVal = dragConfig.type === 'proportional' ? startVal * Math.pow(1.006, deltaX) : startVal + deltaX * dragConfig.step;
                        if (dragConfig.min !== undefined) newVal = Math.max(dragConfig.min, newVal);
                        if (dragConfig.max !== undefined) newVal = Math.min(dragConfig.max, newVal);
                        callback(newVal); applyDragVisuals(newVal);
                    }
                };

                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    document.body.style.cursor = ''; document.body.style.userSelect = '';
                    if (hasDragged) clearDragVisuals(); else triggerClickAction();
                };
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            };

            const triggerClickAction = () => {
                if (isMobileDevice) {
                    openValueModal(title, getVal(), callback);
                } else {
                    if (btn.querySelector('input')) return; 
                    const inlineInput = document.createElement('input');
                    inlineInput.type = 'number'; inlineInput.step = 'any';
                    inlineInput.value = getVal().toFixed(2).replace(/\.00$/, '');
                    inlineInput.className = 'w-full h-full bg-[#111111] text-center text-[#fbbf24] outline-none font-osd rounded-sm px-1';
                    btn.textContent = ''; btn.appendChild(inlineInput);
                    inlineInput.focus(); inlineInput.select();

                    let isDone = false;
                    const finishEdit = (saveVal) => {
                        if (isDone) return; isDone = true;
                        const val = parseFloat(inlineInput.value);
                        btn.textContent = originalText;
                        if (saveVal && !isNaN(val)) callback(val);
                    };
                    inlineInput.addEventListener('blur', () => finishEdit(true));
                    inlineInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') finishEdit(true);
                        if (e.key === 'Escape') finishEdit(false);
                    });
                }
            };
            btn.addEventListener('mousedown', onMouseDown);
        }

        bindSmartInput('btn-time-val', 'Time/div (µs)', () => timebaseUs, (newVal) => {
            timebaseUs = Math.max(1, newVal); updateLabels(); sendCommand("T" + Math.round(timebaseUs));
        }, { type: 'proportional', min: 1, max: 100000 });

        bindSmartInput('btn-hpos-val', 'Horizontal Position (divs)', () => horizontalOffsetDivs, (newVal) => {
            horizontalOffsetDivs = Math.max(-10, Math.min(10, newVal)); updateHorizontalOffsetUI();
        }, { type: 'linear', step: 0.04, min: -10, max: 10 });

        bindSmartInput('btn-volt-val', 'CH1 Volts/div', () => voltsPerDiv, (newVal) => {
            voltsPerDiv = Math.max(0.01, newVal); updateLabels();
        }, { type: 'proportional', min: 0.01, max: 50 });

        bindSmartInput('btn-vpos-val', 'Vertical Position (divs)', () => verticalOffset, (newVal) => {
            verticalOffset = newVal; drawWaveform(lastData);
        }, { type: 'linear', step: 0.04, min: -15, max: 15 });

        bindSmartInput('btn-trigl-val', 'Trigger Level (V)', () => triggerLevelV, (newVal) => {
            triggerLevelV = Math.max(0, Math.min(3.3, newVal));
            sendCommand("L" + Math.floor((triggerLevelV / 3.3) * 255)); updateLabels();
        }, { type: 'linear', step: 0.012, min: 0, max: 3.3 });

        function updateLabels() {
            txtTimeDiv.textContent = timebaseUs >= 1000 ? (timebaseUs / 1000).toFixed(1).replace('.0', '') + "ms/div" : Math.round(timebaseUs) + "us/div";
            txtVoltsDiv.textContent = voltsPerDiv.toFixed(2) + "V/div";
            txtTrigLevel.textContent = triggerLevelV.toFixed(2) + "V";
            txtSampleRate.textContent = ((1000000 / (timebaseUs + 9)) / 1000).toFixed(1) + " kS/s";
            if (lastData && lastData.length > 0) drawWaveform(lastData); else drawGraticule(); 
        }

        function updateRunStateUI() {
            if (isPaused) {
                btnRunStop.textContent = "RUN";
                btnRunStop.className = "w-full bg-yellow-400 text-black border border-yellow-500 rounded-sm font-bold py-2 text-sm transition-all hover:bg-yellow-500";
                txtRunState.textContent = "STOPPED";
                txtRunState.className = "text-gray-500 font-bold";
            } else {
                btnRunStop.textContent = "STOP";
                btnRunStop.className = "w-full bg-[#1a1a1a] text-gray-400 border border-gray-700 rounded-sm font-bold py-2 text-sm transition-all hover:bg-[#222] hover:text-white";
                txtRunState.textContent = "RUNNING - " + (triggerMode === 0 ? "FREE RUN" : (triggerMode === 1 ? "AUTO TRIG" : "NORM TRIG"));
                txtRunState.className = "text-gray-300 font-bold";
            }
        }

        btnRunStop.addEventListener('click', () => {
            isPaused = !isPaused; updateRunStateUI(); sendCommand("P" + (isPaused ? "1" : "0"));
        });

        function setTriggerMode(mode) {
            triggerMode = mode;
            btnTrigNone.className = mode === 0 ? "flex-1 bg-yellow-400 text-black transition" : "flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition";
            btnTrigAuto.className = mode === 1 ? "flex-1 bg-yellow-400 text-black transition border-x border-gray-700" : "flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition border-x border-gray-700";
            btnTrigNorm.className = mode === 2 ? "flex-1 bg-yellow-400 text-black transition" : "flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition";
            updateRunStateUI(); sendCommand("M" + mode);
        }

        btnTrigNone.addEventListener('click', () => setTriggerMode(0));
        btnTrigAuto.addEventListener('click', () => setTriggerMode(1));
        btnTrigNorm.addEventListener('click', () => setTriggerMode(2));

        document.getElementById('btn-time-minus').addEventListener('click', () => {
            let next = [...timeSettings].reverse().find(t => t < timebaseUs - 0.1);
            if(next) { timebaseUs = next; updateLabels(); sendCommand("T" + Math.round(timebaseUs)); }
        });
        document.getElementById('btn-time-plus').addEventListener('click', () => {
            let next = timeSettings.find(t => t > timebaseUs + 0.1);
            if(next) { timebaseUs = next; updateLabels(); sendCommand("T" + Math.round(timebaseUs)); }
        });

        document.getElementById('btn-volt-minus').addEventListener('click', () => {
            let next = [...voltSettings].reverse().find(v => v < voltsPerDiv - 0.001);
            if(next) { voltsPerDiv = next; updateLabels(); }
        });
        document.getElementById('btn-volt-plus').addEventListener('click', () => {
            let next = voltSettings.find(v => v > voltsPerDiv + 0.001);
            if(next) { voltsPerDiv = next; updateLabels(); }
        });

        function updateHorizontalOffsetUI() {
            txtTrigOffset.textContent = (horizontalOffsetDivs >= 0 ? '+' : '') + horizontalOffsetDivs.toFixed(1) + " divs";
            drawWaveform(lastData);
        }

        document.getElementById('btn-hpos-minus').addEventListener('click', () => { horizontalOffsetDivs = Math.max(-5, horizontalOffsetDivs - 0.1); updateHorizontalOffsetUI(); });
        document.getElementById('btn-hpos-plus').addEventListener('click', () => { horizontalOffsetDivs = Math.min(5, horizontalOffsetDivs + 0.1); updateHorizontalOffsetUI(); });
        document.getElementById('btn-vpos-minus').addEventListener('click', () => { verticalOffset -= 0.5; drawWaveform(lastData); });
        document.getElementById('btn-vpos-plus').addEventListener('click', () => { verticalOffset += 0.5; drawWaveform(lastData); });

        // --- Canvas Dragging ---
        let isDragging = false, lastDragX = 0, lastDragY = 0, dragAxis = null, startDragX = 0, startDragY = 0;
        const handleDragStart = (x, y) => { isDragging = true; startDragX = x; startDragY = y; lastDragX = x; lastDragY = y; dragAxis = null; canvas.style.cursor = 'move'; };
        const handleDragMove = (x, y) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect(), dx_px = rect.width / hDivs, dy_px = rect.height / vDivs;
            const deltaX = x - lastDragX, deltaY = y - lastDragY;
            if (!dragAxis && (Math.abs(x - startDragX) > 5 || Math.abs(y - startDragY) > 5)) { dragAxis = Math.abs(x - startDragX) > Math.abs(y - startDragY) ? 'x' : 'y'; canvas.style.cursor = dragAxis === 'x' ? 'ew-resize' : 'ns-resize'; }
            lastDragX = x; lastDragY = y;
            if (dragAxis === 'x') { horizontalOffsetDivs = Math.max(-5, Math.min(5, horizontalOffsetDivs + (deltaX / dx_px))); updateHorizontalOffsetUI(); }
            else if (dragAxis === 'y') { verticalOffset -= (deltaY / dy_px); drawWaveform(lastData); }
        };
        const handleDragEnd = () => { isDragging = false; dragAxis = null; canvas.style.cursor = 'move'; };

        canvas.addEventListener('mousedown', (e) => handleDragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleDragMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleDragEnd);

        document.getElementById('btn-trigl-minus').addEventListener('click', () => { triggerLevelV = Math.max(0, triggerLevelV - 0.1); sendCommand("L" + Math.floor((triggerLevelV / 3.3) * 255)); updateLabels(); });
        document.getElementById('btn-trigl-plus').addEventListener('click', () => { triggerLevelV = Math.min(3.3, triggerLevelV + 0.1); sendCommand("L" + Math.floor((triggerLevelV / 3.3) * 255)); updateLabels(); });

        btnEdgeRise.addEventListener('click', () => { currentEdge = 1; btnEdgeRise.className = "flex-1 bg-yellow-400 text-black transition border-r border-gray-700"; btnEdgeFall.className = "flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition"; sendCommand("E1"); });
        btnEdgeFall.addEventListener('click', () => { currentEdge = 0; btnEdgeFall.className = "flex-1 bg-yellow-400 text-black transition"; btnEdgeRise.className = "flex-1 bg-[#1a1a1a] text-gray-500 hover:bg-[#222] transition border-r border-gray-700"; sendCommand("E0"); });

        function drawGraticule() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height, dx = w / hDivs, dy = h / vDivs;
            ctx.beginPath(); ctx.strokeStyle = '#222222'; ctx.lineWidth = 1;
            for(let i = 1; i < hDivs; i++) { ctx.moveTo(i * dx, 0); ctx.lineTo(i * dx, h); }
            for(let i = 1; i < vDivs; i++) { ctx.moveTo(0, i * dy); ctx.lineTo(w, i * dy); }
            ctx.stroke();

            ctx.beginPath(); ctx.strokeStyle = '#444444';
            let centerY = h / 2, centerX = w / 2;
            ctx.moveTo(0, centerY); ctx.lineTo(w, centerY); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, h);
            for(let i = 0; i < hDivs * 5; i++) { let tickX = i * (dx / 5), tickLen = (i % 5 === 0) ? 6 : 3; ctx.moveTo(tickX, centerY - tickLen); ctx.lineTo(tickX, centerY + tickLen); }
            for(let i = 0; i < vDivs * 5; i++) { let tickY = i * (dy / 5), tickLen = (i % 5 === 0) ? 6 : 3; ctx.moveTo(centerX - tickLen, tickY); ctx.lineTo(centerX + tickLen, tickY); }
            ctx.stroke();
        }

        function drawWaveform(data) {
            if (!hasReceivedData || !data || data.length === 0) { drawGraticule(); return; }
            drawGraticule();
            const w = canvas.width, h = canvas.height, dx = w / hDivs, dy = h / vDivs, pixelPerVolt = dy / voltsPerDiv;
            let zeroVoltY = (h/2) + (1.65 * pixelPerVolt) - (verticalOffset * dy), xOffset = horizontalOffsetDivs * dx;

            ctx.beginPath(); ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
            const sliceWidth = w / data.length; let firstPoint = true;
            const drawSegment = (startX) => {
                let x = startX;
                for (let i = 0; i < data.length; i++) {
                    let y = zeroVoltY - (((data[i] / 255.0) * 3.3) * pixelPerVolt);
                    if (firstPoint) { ctx.moveTo(x, y); firstPoint = false; } else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
            };
            if (xOffset > 0) drawSegment(xOffset - w);
            drawSegment(xOffset);
            if (xOffset < 0) drawSegment(xOffset + w);
            ctx.stroke();
        }

        function calculateStats(data) {
            let max = 0, min = 255;
            for(let i=0; i<data.length; i++) { if(data[i] > max) max = data[i]; if(data[i] < min) min = data[i]; }
            let vMaxReal = (max / 255.0) * 3.3, vMinReal = (min / 255.0) * 3.3;
            document.getElementById('osd-vmax').textContent = "+" + vMaxReal.toFixed(2) + "V";
            document.getElementById('osd-vmin').textContent = "+" + vMinReal.toFixed(2) + "V";
            document.getElementById('osd-vpp').textContent = "+" + (vMaxReal - vMinReal).toFixed(2) + "V";

            let crossings = 0, firstCrossIdx = -1, lastCrossIdx = -1, midPoint = (max + min) / 2;
            for(let i=1; i<data.length; i++) {
                if(data[i-1] < midPoint && data[i] >= midPoint) {
                    if(firstCrossIdx === -1) firstCrossIdx = i;
                    lastCrossIdx = i; crossings++;
                }
            }
            if (crossings > 1) {
                let freq = 1.0 / (((lastCrossIdx - firstCrossIdx) / (crossings - 1)) * ((timebaseUs + 9) / 1000000.0));
                document.getElementById('osd-freq').textContent = freq > 999 ? (freq/1000).toFixed(2) + ' kHz' : Math.round(freq) + ' Hz';
            } else { document.getElementById('osd-freq').textContent = "<1 Hz"; }
        }

        updateLabels(); updateDemoUI(); 
    </script>
</body>
